<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - WeClaw</title>
    <script src="/admin/cdn_resources/tailwindcss.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
        }
        
        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .cyber-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.2);
            color: #f1f5f9;
        }
        
        .cyber-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }
        
        .cyber-button {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            transition: all 0.3s ease;
        }
        
        .cyber-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg">
                <span class="text-3xl font-bold text-white">W</span>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                WeClaw Admin
            </h1>
            <p class="text-gray-400 mt-2">管理后台登录</p>
        </div>
        
        <!-- 错误提示 -->
        <div id="error-message" class="hidden bg-red-500/20 border border-red-500 text-red-300 px-4 py-3 rounded-lg mb-6">
            <span id="error-text"></span>
        </div>
        
        <!-- 登录表单 -->
        <form id="login-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-2">
                    用户名
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required
                    class="cyber-input w-full px-4 py-3 rounded-lg focus:outline-none"
                    placeholder="请输入用户名"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                    密码
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    class="cyber-input w-full px-4 py-3 rounded-lg focus:outline-none"
                    placeholder="请输入密码"
                >
            </div>
            
            <button 
                type="submit" 
                class="cyber-button w-full py-3 rounded-lg text-white font-semibold"
            >
                登录
            </button>
        </form>
        
        <!-- 页脚 -->
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>WeClaw 后台管理系统</p>
        </div>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            try {
                // 使用表单提交获取 token
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('/admin/api/admin/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // 保存 token 到 localStorage
                    localStorage.setItem('admin_token', data.access_token);
                    // 跳转到仪表盘
                    window.location.href = '/admin/dashboard';
                } else {
                    const error = await response.json();
                    errorDiv.classList.remove('hidden');
                    errorText.textContent = error.detail || '登录失败，请检查用户名和密码';
                }
            } catch (err) {
                errorDiv.classList.remove('hidden');
                errorText.textContent = '网络错误，请稍后重试';
                console.error('Login error:', err);
            }
        });
    </script>
</body>
</html>
