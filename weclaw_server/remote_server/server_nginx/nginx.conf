    # =============== 子域名服务：ws.madechango.com ===============
    # HTTP 自动跳转 HTTPS
    server {
        listen 80;
        server_name ws.madechango.com www.ws.madechango.com;

        # 强制跳转到 HTTPS
        return 301 https://ws.madechango.com$request_uri;
    }

    # HTTPS 主服务
    server {
        listen 443 ssl;
        server_name ws.madechango.com www.ws.madechango.com;

        # SSL 证书配置（请替换为你的实际证书路径）
        ssl_certificate     d:/nginx/hssl/ws.madechango.com.pem;      # 证书文件
        ssl_certificate_key d:/nginx/hssl/ws.madechango.com.key;      # 私钥文件

        # nginx 日志文件
        access_log d:/deploy1/nginx_access.log json_log;
        error_log  d:/deploy1/nginx_error.log warn;

        # 安全协议与加密套件（推荐配置）
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;


        # ==================== AI换装 ====================
        location / {
            root D:/deploy1/AiChange/dist/;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        location /static_ai {
            alias D:/deploy1/AiChange/Ai_fastapi/app/static_ai/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        location /ai {
            proxy_pass http://127.0.0.1:8009;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }



        # ==================== 微信小程序 ====================
        location /static {
            alias D:/deploy1/mc_fastapi/app/static/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        location /ws {
            proxy_pass http://127.0.0.1:8008;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 专用配置
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;             # 处理 websocket 升级
            proxy_set_header Connection "upgrade";              # 允许连接升级

