# WeClaw Remote Server Nginx Configuration
# 适用于 Windows Server 2022 + Nginx
# 域名：weclaw.cc
# HTTPS: Let's Encrypt 证书

# 上游服务器 - FastAPI 后端
upstream weclaw_backend {
    server 127.0.0.1:8188;
    keepalive 32;
}

# HTTP 服务器 - 用于 Let's Encrypt 验证，其他请求重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name weclaw.cc *.weclaw.cc 8.213.158.97;
    
    # Let's Encrypt 验证路径 (win-acme 默认路径)
    location /.well-known/acme-challenge/ {
        root D:/www/weclaw;
        try_files $uri =404;
    }
    
    # 所有其他请求强制重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
    
    access_log D:/nginx/logs/weclaw_http_access.log;
    error_log D:/nginx/logs/weclaw_http_error.log;
}

# HTTPS 主服务器
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name weclaw.cc *.weclaw.cc;
    
    # SSL 证书配置 (Let's Encrypt 证书)
    ssl_certificate D:/nginx/ssl/weclaw.cc/fullchain.pem;
    ssl_certificate_key D:/nginx/ssl/weclaw.cc/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS (Let's Encrypt 证书已开启)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # PWA 静态文件
    root D:/python_projects/weclaw_server/pwa/dist;
    index index.html;
    
    # API 代理 - FastAPI 后端
    location /api/ {
        proxy_pass http://weclaw_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # WebSocket 代理 - PWA 客户端
    location /ws/chat {
        proxy_pass http://weclaw_backend/ws/chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # WebSocket 代理 - WeClaw Bridge
    location /ws/bridge {
        proxy_pass http://weclaw_backend/ws/bridge;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # SSE 流式响应代理
    location /api/chat/stream {
        proxy_pass http://weclaw_backend/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering 'no';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://weclaw_backend/health;
        access_log off;
    }
    
    # ========== WeClaw 后台管理模块代理 ==========
    # Admin 根路径 - 精确匹配，重定向到带斜杠的路径
    location = /admin {
        return 301 /admin/;
    }
    
    # Admin 静态资源（HTML/CSS/JS）- 禁用缓存
    location /admin/ {
        proxy_pass http://weclaw_backend/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 禁用缓存，确保获取最新版本
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Admin API 接口 - 禁用缓存
    location /admin/api/ {
        proxy_pass http://weclaw_backend/admin/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 禁用缓存
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # PWA 静态文件 - 长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Service Worker - 不缓存
    location /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    
    # PWA manifest
    location /manifest.webmanifest {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    
    # 文件上传端点
    location /api/files/upload {
        proxy_pass http://weclaw_backend/api/files/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 100M;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # PWA 前端路由
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
    
    # 错误页面配置
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
    
    # 日志配置
    access_log D:/nginx/logs/weclaw_https_access.log;
    error_log D:/nginx/logs/weclaw_https_error.log;
    
    # 客户端请求限制
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
}
