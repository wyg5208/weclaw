# 日志配置

[logging]
# 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"

# 日志目录
log_dir = "logs"

# 是否启用文件日志
enable_file_log = true

# 是否启用控制台日志
enable_console = true

# 日志轮转策略：S(秒), M(分), H(时), D(天), W(周), midnight
rotation = "D"

# 保留的日志文件数量（天数）
backup_count = 7

# 日志格式：simple, detailed
format = "detailed"

# 是否单独记录错误日志
separate_error_log = true

# 是否记录 HTTP 请求详情
log_http_requests = true

# 是否记录 WebSocket 消息（默认关闭，避免日志过多）
log_websocket_messages = false
