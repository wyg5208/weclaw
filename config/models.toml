# WinClaw 模型配置
# 每个模型定义在 [models.<key>] 节下
# 必填字段: id, name, provider, api_type
# 可选字段: base_url, api_key_env, input_types, supports_function_calling,
#           context_window, max_tokens, cost_input, cost_output, tags

# ============================================================================
# DeepSeek（默认首选，性价比最高）
# ============================================================================
# 每个模型定义在 [models.<key>] 节下
# 必填字段: id, name, provider, api_type
# 可选字段: base_url, api_key_env, input_types, supports_function_calling,
#           context_window, max_tokens, cost_input, cost_output, tags

# ============================================================================
# DeepSeek（默认首选，性价比最高）
# ============================================================================

[models.deepseek-chat]
id = "deepseek/deepseek-chat"
name = "DeepSeek V3"
provider = "deepseek"
api_type = "openai"
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
input_types = ["text"]
supports_function_calling = true
context_window = 64000
max_tokens = 8192
cost_input = 0.14
cost_output = 0.28
tags = ["default", "cheap", "function-calling"]

[models.deepseek-reasoner]
id = "deepseek/deepseek-reasoner"
name = "DeepSeek R1 (思考模式)"
provider = "deepseek"
api_type = "openai"
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
input_types = ["text"]
supports_function_calling = false
context_window = 64000
max_tokens = 8192
cost_input = 0.55
cost_output = 2.19
tags = ["reasoning"]

