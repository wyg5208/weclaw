# WinClaw Remote Server - HTTP Only (开发测试版)
# 适用于 Windows Server 2022 + Nginx
# 注意：此配置不含 HTTPS，PWA 功能受限，仅供内部测试使用
# 警告：此配置文件已被废弃，请使用 winclaw.conf

# 上游服务器 - FastAPI 后端（已在 winclaw.conf 中定义）
# upstream winclaw_backend {
#     server 127.0.0.1:8188;
#     keepalive 32;
# }

# HTTP 服务器（仅用于本地测试，不绑定域名）
server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    
    # 根目录 - PWA 静态文件 (修改为实际路径)
    root D:/python_projects/weclaw_server/pwa/dist;
    index index.html;
    
    # 日志配置
    access_log D:/python_projects/weclaw_server/logs/nginx_access.log;
    error_log D:/python_projects/weclaw_server/logs/nginx_error.log;
    
    # 客户端请求限制
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    
    # PWA 静态文件 - 长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Service Worker - 不缓存
    location /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    
    # PWA manifest
    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    
    # API 代理 - FastAPI 后端
    location /api/ {
        proxy_pass http://winclaw_backend/api/;
        proxy_http_version 1.1;
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # WebSocket 代理 - PWA 客户端
    location /ws/chat {
        proxy_pass http://winclaw_backend/ws/chat;
        proxy_http_version 1.1;
        
        # WebSocket 升级头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 超时设置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # WebSocket 代理 - WinClaw Bridge
    location /ws/bridge {
        proxy_pass http://winclaw_backend/ws/bridge;
        proxy_http_version 1.1;
        
        # WebSocket 升级头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 超时设置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # SSE 流式响应代理
    location /api/chat/stream {
        proxy_pass http://winclaw_backend/api/chat/stream;
        proxy_http_version 1.1;
        
        # SSE 头
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering 'no';
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 超时设置 - 长连接
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 禁用缓冲
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://winclaw_backend/health;
        access_log off;
    }
    
    # 文件上传端点 - 增大限制
    location /api/files/upload {
        proxy_pass http://winclaw_backend/api/files/upload;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        client_max_body_size 100M;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # 静态文件下载
    location /api/files/ {
        proxy_pass http://winclaw_backend/api/files/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 支持大文件下载
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # PWA 前端路由 - 所有未匹配的路由返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
