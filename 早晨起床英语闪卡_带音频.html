<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早晨起床英语闪卡 - 带音频版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .stats {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 20px auto;
            max-width: 400px;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .flashcards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .flashcard {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .flashcard:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        
        .flashcard.flipped {
            background: #f8f9fa;
        }
        
        .card-front, .card-back {
            text-align: center;
            width: 100%;
        }
        
        .card-front h3 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 15px;
        }
        
        .card-back h3 {
            font-size: 1.8rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .card-back p {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.6;
        }
        
        .audio-controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .play-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .play-btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }
        
        .play-btn i {
            font-size: 1.2rem;
        }
        
        .flip-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .flip-btn:hover {
            background: #38a169;
            transform: scale(1.05);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .instructions {
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .instructions h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .instructions ul {
            list-style-position: inside;
            margin-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 10px;
            color: #555;
        }
        
        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .flashcards-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌅 早晨起床英语闪卡</h1>
            <p>点击卡片翻转，点击播放按钮听发音</p>
        </div>
        
        <div class="stats">
            <p>📚 共15张闪卡 | 🔊 全部支持语音播放</p>
        </div>
        
        <div class="flashcards-container" id="flashcardsContainer">
            <!-- 闪卡将通过JavaScript动态生成 -->
        </div>
        
        <div class="instructions">
            <h3>📖 使用说明：</h3>
            <ul>
                <li><strong>点击卡片</strong>：翻转查看中文翻译</li>
                <li><strong>点击播放按钮</strong>：听英语单词发音</li>
                <li><strong>点击翻转按钮</strong>：手动翻转卡片</li>
                <li><strong>学习建议</strong>：每天复习5-10分钟，跟读发音</li>
                <li><strong>发音说明</strong>：使用浏览器内置语音合成技术，发音清晰标准</li>
            </ul>
        </div>
    </div>

    <script>
        // 闪卡数据
        const flashcards = [
            { english: "Wake up", chinese: "醒来", phonetic: "/weɪk ʌp/" },
            { english: "Get out of bed", chinese: "起床", phonetic: "/ɡet aʊt əv bed/" },
            { english: "Stretch", chinese: "伸展身体", phonetic: "/stretʃ/" },
            { english: "Make the bed", chinese: "整理床铺", phonetic: "/meɪk ðə bed/" },
            { english: "Brush teeth", chinese: "刷牙", phonetic: "/brʌʃ tiːθ/" },
            { english: "Wash face", chinese: "洗脸", phonetic: "/wɒʃ feɪs/" },
            { english: "Take a shower", chinese: "洗澡", phonetic: "/teɪk ə ˈʃaʊər/" },
            { english: "Get dressed", chinese: "穿衣服", phonetic: "/ɡet drest/" },
            { english: "Have breakfast", chinese: "吃早餐", phonetic: "/hæv ˈbrekfəst/" },
            { english: "Drink coffee/tea", chinese: "喝咖啡/茶", phonetic: "/drɪŋk ˈkɒfi/tiː/" },
            { english: "Check the weather", chinese: "查看天气", phonetic: "/tʃek ðə ˈweðər/" },
            { english: "Pack bag", chinese: "收拾书包/包", phonetic: "/pæk bæɡ/" },
            { english: "Leave for work/school", chinese: "出发去上班/上学", phonetic: "/liːv fɔːr wɜːrk/skuːl/" },
            { english: "Good morning!", chinese: "早上好！", phonetic: "/ɡʊd ˈmɔːrnɪŋ/" },
            { english: "What time is it?", chinese: "现在几点了？", phonetic: "/wʌt taɪm ɪz ɪt/" }
        ];

        // 初始化语音合成
        const speech = window.speechSynthesis;
        
        // 生成闪卡HTML
        function generateFlashcards() {
            const container = document.getElementById('flashcardsContainer');
            
            flashcards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'flashcard';
                cardElement.dataset.index = index;
                cardElement.dataset.flipped = 'false';
                
                cardElement.innerHTML = `
                    <div class="card-number">${index + 1}</div>
                    <div class="card-front">
                        <h3>${card.english}</h3>
                        <p style="color: #666; margin-bottom: 10px;">${card.phonetic}</p>
                        <div class="audio-controls">
                            <button class="play-btn" onclick="playWord(${index})">
                                <i class="fas fa-volume-up"></i> 播放发音
                            </button>
                            <button class="flip-btn" onclick="flipCard(${index})">
                                <i class="fas fa-sync-alt"></i> 翻转卡片
                            </button>
                        </div>
                    </div>
                    <div class="card-back" style="display: none;">
                        <h3>${card.chinese}</h3>
                        <p><strong>英文：</strong>${card.english}</p>
                        <p><strong>音标：</strong>${card.phonetic}</p>
                        <div class="audio-controls">
                            <button class="play-btn" onclick="playWord(${index})">
                                <i class="fas fa-volume-up"></i> 播放发音
                            </button>
                            <button class="flip-btn" onclick="flipCard(${index})">
                                <i class="fas fa-sync-alt"></i> 翻转卡片
                            </button>
                        </div>
                    </div>
                `;
                
                // 点击卡片翻转
                cardElement.addEventListener('click', (e) => {
                    if (!e.target.closest('.play-btn') && !e.target.closest('.flip-btn')) {
                        flipCard(index);
                    }
                });
                
                container.appendChild(cardElement);
            });
        }
        
        // 播放单词发音
        function playWord(index) {
            if (speech.speaking) {
                speech.cancel();
            }
            
            const card = flashcards[index];
            const utterance = new SpeechSynthesisUtterance(card.english);
            
            // 设置语音参数
            utterance.rate = 0.8; // 语速
            utterance.pitch = 1;  // 音调
            utterance.volume = 1; // 音量
            
            // 使用英语发音
            utterance.lang = 'en-US';
            
            // 播放
            speech.speak(utterance);
            
            // 添加视觉反馈
            const cardElement = document.querySelector(`.flashcard[data-index="${index}"]`);
            const playBtn = cardElement.querySelector('.play-btn');
            
            playBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 播放中...';
            playBtn.style.background = '#48bb78';
            
            utterance.onend = () => {
                playBtn.innerHTML = '<i class="fas fa-volume-up"></i> 播放发音';
                playBtn.style.background = '#667eea';
            };
        }
        
        // 翻转卡片
        function flipCard(index) {
            const cardElement = document.querySelector(`.flashcard[data-index="${index}"]`);
            const isFlipped = cardElement.dataset.flipped === 'true';
            const front = cardElement.querySelector('.card-front');
            const back = cardElement.querySelector('.card-back');
            
            if (isFlipped) {
                // 翻回正面
                front.style.display = 'block';
                back.style.display = 'none';
                cardElement.dataset.flipped = 'false';
                cardElement.classList.remove('flipped');
            } else {
                // 翻到背面
                front.style.display = 'none';
                back.style.display = 'block';
                cardElement.dataset.flipped = 'true';
                cardElement.classList.add('flipped');
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', generateFlashcards);
        
        // 添加全局控制
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                // 空格键播放当前聚焦卡片的发音
                const activeCard = document.querySelector('.flashcard:hover');
                if (activeCard) {
                    const index = parseInt(activeCard.dataset.index);
                    playWord(index);
                }
            }
        });
    </script>
</body>
</html>
